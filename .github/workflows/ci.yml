name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: projects/clawdevflow/04_coding/src/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: projects/clawdevflow/04_coding/src
      - name: Lint docs
        run: npm run lint:docs
        working-directory: projects/clawdevflow/04_coding/src
      - name: Run tests
        run: npm test
        working-directory: projects/clawdevflow/04_coding/src
