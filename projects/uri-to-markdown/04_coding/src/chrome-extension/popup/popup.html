<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URI to Markdown</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }

    .header img {
      width: 32px;
      height: 32px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .options {
      margin-bottom: 16px;
      background: #f8f9fa;
      padding: 12px;
      border-radius: 6px;
    }

    .option-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .option-item:last-child {
      margin-bottom: 0;
    }

    .option-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .option-item label {
      cursor: pointer;
      flex: 1;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #0056b3;
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #6c757d;
    }

    .btn-secondary:hover {
      background: #545b62;
    }

    .preview {
      margin-top: 16px;
      max-height: 300px;
      overflow: auto;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px;
      background: #fafafa;
      display: none;
    }

    .preview.show {
      display: block;
    }

    .preview pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      display: none;
    }

    .actions.show {
      display: flex;
    }

    .actions button {
      flex: 1;
    }

    .status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
    }

    .status.info {
      background: #d1ecf1;
      color: #0c5460;
    }

    .meta-info {
      margin-top: 12px;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }

    .meta-info.show {
      display: block;
    }

    .meta-info p {
      margin-bottom: 4px;
    }

    .meta-info p:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon-48.png" alt="icon">
    <h1>URI to Markdown</h1>
  </div>

  <div class="options">
    <div class="option-item">
      <input type="checkbox" id="withMeta" checked>
      <label for="withMeta">包含元数据（标题/作者/日期）</label>
    </div>
    <div class="option-item">
      <input type="checkbox" id="withAttachments" checked>
      <label for="withAttachments">包含附件列表</label>
    </div>
    <div class="option-item">
      <input type="checkbox" id="withFields" checked>
      <label for="withFields">包含表单字段（致远 OA）</label>
    </div>
  </div>

  <button id="convertBtn" class="btn">转换当前页面</button>

  <div id="status" class="status"></div>

  <div id="metaInfo" class="meta-info"></div>

  <div id="preview" class="preview">
    <pre id="previewContent"></pre>
  </div>

  <div id="actions" class="actions">
    <button id="copyBtn" class="btn btn-secondary">复制</button>
    <button id="downloadBtn" class="btn">下载</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
