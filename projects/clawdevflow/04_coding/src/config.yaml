# 流程引擎配置文件

> **版本**: v2.0.0  
> **说明**: 流程引擎运行时配置，支持 AI 工具选择、审阅配置、回滚策略等

---

## 全局设置

```yaml
global:
  # 默认 AI 工具
  defaultAITool: opencode
  
  # 工作区根目录
  workspaceRoot: /home/ouyp/Learning/Practice/openclaw-universe
  
  # 日志级别 (debug | info | warn | error)
  logLevel: info
  
  # 状态文件路径
  stateFile: ./state.json
  
  # 日志目录
  logDir: ./logs
```

---

## 各阶段配置

```yaml
stages:
  # ========== designing 阶段 ==========
  designing:
    # 使用的 AI 工具（覆盖全局默认）
    aiTool: opencode
    
    # 是否需要审阅（默认 true）
    requireReview: true
    
    # 子会话超时（秒）
    timeoutSeconds: 1800
    
    # 最大重试次数
    maxRetries: 3
    
    # 输出目录
    outputDir: 01_designing
    
    # 输出文件
    outputs:
      - PRD.md
      - TRD.md
    
    # 审阅检查点
    reviewCheckpoints:
      - id: D1
        name: 需求覆盖率 100%
        description: 对照 REQUIREMENTS.md 逐条核对
      - id: D2
        name: 无模糊描述
        description: 搜索"适当的"、"一些"、"可能"等模糊词
      - id: D3
        name: 技术选型合理
        description: 检查技术选型章节的比较表
      - id: D4
        name: PRD/TRD 职责清晰
        description: PRD 只含需求+UI，TRD 只含技术 + 数据库
      - id: D5
        name: 异常处理完整
        description: 正常流程 + 失败处理 + 边界情况都覆盖
      - id: D6
        name: 向后兼容
        description: 明确说明兼容性策略（增量需求适用）

  # ========== roadmapping 阶段 ==========
  roadmapping:
    aiTool: opencode
    requireReview: true
    timeoutSeconds: 1800
    maxRetries: 3
    outputDir: 02_roadmapping
    outputs:
      - ROADMAP.md
    reviewCheckpoints:
      - id: R1
        name: 任务拆分合理
        description: 所有任务在 0.5-2 人天范围内
      - id: R2
        name: 依赖关系清晰
        description: 前置任务明确标注
      - id: R3
        name: 工作量估算可信
        description: 估算与复杂度匹配
      - id: R4
        name: 包含联调测试项
        description: 前后端各有联调测试项
      - id: R5
        name: 包含演示项
        description: 固定 0.5 人天演示项
      - id: R6
        name: 涉及模块完整
        description: 所有改动模块都列出

  # ========== detailing 阶段 ==========
  detailing:
    aiTool: opencode
    requireReview: true
    timeoutSeconds: 1800
    maxRetries: 3
    outputDir: 03_detailing
    outputs:
      - DETAIL.md
    reviewCheckpoints:
      - id: D1
        name: 文件级设计完整
        description: 所有需要新增/修改的文件都列出
      - id: D2
        name: 接口定义清晰
        description: 方法名、参数、返回值完整
      - id: D3
        name: 无实现代码
        description: 只有方法签名，无实现逻辑
      - id: D4
        name: 符合最佳实践
        description: 设计符合框架约定
      - id: D5
        name: 数据库变更完整
        description: 表结构、字段、索引都定义
      - id: D6
        name: 配置变更完整
        description: 新增配置项都列出

  # ========== coding 阶段 ==========
  coding:
    aiTool: opencode
    requireReview: true
    timeoutSeconds: 3600
    maxRetries: 3
    outputDir: 04_coding
    outputs:
      - src/
      - tests/
      - README.md
    reviewCheckpoints:
      - id: C1
        name: 功能完整实现
        description: 对照 DETAIL.md 逐条核对
      - id: C2
        name: 类型安全
        description: 无 any/raw type 等模糊类型
      - id: C3
        name: 测试覆盖核心逻辑
        description: 核心业务逻辑有单元测试
      - id: C4
        name: 无重复代码
        description: 无明显重复逻辑
      - id: C5
        name: 边界处理完整
        description: null/undefined/空集合都处理
      - id: C6
        name: 代码符合最佳实践
        description: 遵循框架约定和最佳实践
      - id: C7
        name: 文档完整
        description: 安装、使用、配置说明完整

  # ========== reviewing 阶段 ==========
  reviewing:
    aiTool: opencode
    requireReview: true
    timeoutSeconds: 1800
    maxRetries: 3
    outputDir: 05_reviewing
    outputs:
      - REVIEW-REPORT.md
    reviewCheckpoints:
      - id: V1
        name: 需求对齐验证
        description: 对照 REQUIREMENTS.md 逐条验证
      - id: V2
        name: 架构一致性检查
        description: 对照 TRD.md 检查架构
      - id: V3
        name: 代码质量审查
        description: 无严重质量问题
      - id: V4
        name: 问题清单完整
        description: 所有发现的问题都列出
      - id: V5
        name: 验收结论清晰
        description: 通过/不通过理由明确
      - id: V6
        name: 修复建议可行
        description: 建议具体可执行
```

