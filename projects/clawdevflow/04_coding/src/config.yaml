## 审阅配置

```yaml
review:
  # 必须审阅的阶段（默认全部）
  requiredStages:
    - designing
    - roadmapping
    - detailing
    - coding
    - reviewing
  
  # 审阅超时（小时），超时后发送提醒
  timeoutHours: 24
  
  # 审阅结论选项
  decisionOptions:
    - pass        # 通过
    - conditional # 条件通过
    - reject      # 驳回
    - clarify     # 需澄清
  
  # 审阅请求模板
  requestTemplate: |
    ## 📋 阶段审阅：{stageName}
    
    ### 本阶段目标
    {stageGoal}
    
    ### 输入文档
    {inputDocuments}
    
    ### 输出文档
    {outputDocuments}
    
    ### 审阅检查点
    | 编号 | 检查项 | 状态 | 备注 |
    |------|--------|------|------|
    {checkpoints}
    
    ### 关键决策
    {keyDecisions}
    
    ### 审阅结论
    请选择：
    - ✅ 通过（进入下一阶段）
    - ⚠️ 条件通过（有以下小问题需后续修复：___）
    - ❌ 驳回（需重新执行当前阶段，原因：___）
    - ❓ 需澄清（有以下问题：___）
```

---

## 回滚策略

```yaml
rollback:
  # 策略：A=当前阶段重做，B=回滚到上阶段，C=完全重启
  strategy: A
  
  # 最大重试次数（每个阶段）
  maxRetriesPerStage: 3
  
  # 最大重试次数（整个流程）
  maxRetriesTotal: 10
  
  # 重试间隔（秒）
  retryDelaySeconds: 5
  
  # 重试时传递驳回原因
  passRejectReason: true
```

---

## 并行化配置

```yaml
parallel:
  # 是否启用并行
  enabled: true
  
  # 可并行的阶段组合
  groups:
    # 前端和后端编码可并行
    - name: coding-parallel
      stages:
        - coding-frontend
        - coding-backend
      maxParallel: 2
  
  # 并行任务数限制
  maxConcurrentTasks: 3
```

---

## AI 工具配置

```yaml
aiTools:
  # ========== OpenCode 配置 ==========
  opencode:
    command: opencode
    args:
      - --print
      - --permission-mode
      - bypassPermissions
    env: {}
  
  # ========== Claude Code 配置 ==========
  claude-code:
    command: claude
    args:
      - --print
      - --permission-mode
      - bypassPermissions
    env: {}
  
  # ========== 自定义 AI 工具配置 ==========
  custom:
    command: /path/to/custom/tool
    args: []
    env:
      API_KEY: ${CUSTOM_AI_API_KEY}
```

---

## 日志配置

```yaml
logging:
  # 日志格式 (json | text)
  format: json
  
  # 日志级别
  level: info
  
  # 日志轮转
  rotation:
    enabled: true
    maxSize: 10MB
    maxFiles: 10
  
  # 日志内容
  include:
    - timestamp
    - workflowId
    - stage
    - event
    - details
```

---

*配置文件说明*：
- 此文件为模板，实际使用时可根据需要调整
- YAML 格式，注意缩进
- 环境变量使用 `${VAR_NAME}` 语法
- 路径支持相对路径（相对于项目根目录）和绝对路径
