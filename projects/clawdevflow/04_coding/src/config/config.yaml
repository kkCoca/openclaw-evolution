global:
  workspaceRoot: ${OPENCLAW_WORKSPACE_ROOT:-../../..}
  defaultAITool: opencode
  logLevel: info
  runtimeDir: ${CDF_RUNTIME_DIR:-.cdf-work}

openclaw:
  command: "opencode"
  args: ["--print"]
  taskArg: "--task"
  timeoutSecondsDefault: 1800

stages:
  designing:
    aiTool: opencode
    requireReview: true
    timeoutSeconds: 1800
    maxRetries: 3
    outputDir: 01_designing
    outputsAllOf: [PRD.md, TRD.md]

  roadmapping:
    aiTool: opencode
    requireReview: true
    timeoutSeconds: 1800
    maxRetries: 3
    outputDir: 02_roadmapping
    outputsAllOf: [ROADMAP.md]

  detailing:
    aiTool: opencode
    requireReview: true
    timeoutSeconds: 1800
    maxRetries: 3
    outputDir: 03_detailing
    outputsAllOf: [DETAIL.md]

  coding:
    aiTool: opencode
    requireReview: true
    timeoutSeconds: 3600
    maxRetries: 3
    outputDir: 04_coding
    outputsAllOf: [src/, CHANGESET.md]

  testing:
    aiTool: opencode
    requireReview: true
    timeoutSeconds: 1800
    maxRetries: 2
    outputDir: 06_testing
    outputsAllOf: [TEST_CONTEXT.json, TEST.log, TEST_RESULTS.json, VERIFY.log, VERIFY_RESULTS.json, VERIFICATION_REPORT.md]

  reviewing:
    aiTool: opencode
    requireReview: true
    timeoutSeconds: 1800
    maxRetries: 2
    outputDir: 05_reviewing
    outputsAllOf: [FINAL_REPORT.md, RELEASE_READINESS.json]

  precommit:
    aiTool: opencode
    requireReview: true
    timeoutSeconds: 1800
    maxRetries: 2
    outputDir: 07_precommit
    outputsAllOf: [PRECOMMIT_PLAN.json, PRECOMMIT_REPORT.json, PRECOMMIT_SUMMARY.md]

  releasing:
    aiTool: opencode
    requireReview: true
    timeoutSeconds: 1800
    maxRetries: 2
    outputDir: 08_releasing
    outputsAllOf: [RELEASE_RECORD.json, RELEASE_NOTES.md, ARTIFACT_MANIFEST.json, CLEANUP_PLAN.json, CLEANUP_REPORT.json]

rollback:
  strategy: A
